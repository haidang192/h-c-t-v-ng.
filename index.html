<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Từ Vựng Tiếng Đức</title>

<style>
body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#74ebd5,#9face6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:2.5rem;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
text-align:center;
width:90%;
max-width:420px;
}

h1{
color:#333;
font-size:1.6rem;
margin-bottom:10px;
}

.progress{
color:#666;
font-size:0.9rem;
margin-bottom:10px;
}

.progress-bar{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.progress-fill{
height:100%;
width:0%;
background:#2ecc71;
transition:width .3s;
}

.word-viet{
font-size:1.8rem;
font-weight:bold;
color:#2c3e50;
margin:20px 0;
}

input[type="text"]{
width:85%;
padding:12px;
font-size:1.2rem;
border:2px solid #ddd;
border-radius:10px;
text-align:center;
margin-bottom:15px;
outline:none;
}

input[type="text"]:focus{
border-color:#2ecc71;
}

.btn{
background:#3498db;
color:white;
border:none;
padding:10px 20px;
font-size:1rem;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.btn-check{
background:#2ecc71;
}

.feedback{
margin-top:15px;
font-weight:bold;
min-height:24px;
}

.correct{color:#27ae60;}
.wrong{color:#e74c3c;}

.speedBox{
margin-top:10px;
font-size:0.9rem;
color:#555;
}
</style>

</head>

<body>

<div class="container">

<h1>📚 Ôn tập từ vựng</h1>

<div class="progress" id="progress">Câu 1 / 77</div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div class="word-viet" id="vietWord">Đang tải...</div>

<button class="btn" onclick="speakWord()">🔊 Nghe phát âm</button>

<div class="speedBox">
Tốc độ đọc:
<input type="range" min="0.4" max="1.2" step="0.05" value="0.7" id="speedSlider">
<span id="speedValue">0.7</span>
</div>

<br>

<input type="text" id="gerInput" placeholder="Nhập từ tiếng Đức..." autocomplete="off">

<div>
<button class="btn btn-check" onclick="checkAnswer()">Kiểm tra</button>
</div>

<div class="feedback" id="feedback"></div>

</div>

<script>

const vocabulary=[

{ viet: "dễ mến", ger: "sympathisch" },
        { viet: "năng động", ger: "aktiv" },
        { viet: "lười", ger: "faul" },
        { viet: "thú vị", ger: "spannend" },
        { viet: "đáng tin cậy", ger: "zuverlässig" },
        { viet: "trung thực", ger: "ehrlich" },
        { viet: "không giỏi thể thao", ger: "unsportlich" },
        { viet: "hài hước", ger: "humorvoll" },
        { viet: "thân thiện", ger: "freundlich" },
        { viet: "không đúng giờ", ger: "unpünktlich" },
        { viet: "đúng giờ", ger: "pünktlich" },
        { viet: "dùng bữa (lịch sự hơn essen)", ger: "speisen" },
        { viet: "tuyệt vời (nhẹ nhàng hơn và lịch sự thường dùng khi để khen)", ger: "wunderbar" },
        { viet: "đặc điểm", ger: "eigenschaften" },
        { viet: "đánh giá", ger: "bewerten" },
		{ viet: "hơn", ger: "mehr" },
        { viet: "không đáng tin cậy", ger: "unzuverlässig" },
        { viet: "vui / buồn cười / hài hước", ger: "lustig" },
        { viet: "giỏi/thích thể thao", ger: "sportlich" },
        { viet: "không hài hước", ger: "humorlos" },
        { viet: "nhàm chán", ger: "langweilig" },
        { viet: "tốt bụng", ger: "nett" },
        { viet: "khó ưa", ger: "unsympathisch" },
		{ viet: "có lẽ", ger: "vielleicht" },
		{ viet: "lịch hẹn, cuộc hẹn", ger: "der Termin" },
		{ viet: "thời khóa biểu", ger: "Stundenplan" },
		{ viet: "tham gia vào hoạt động nào đó", ger: "teilnehmen an dativ" },
		{ viet: "nhìn vào", ger: "anschauen" },
		{ viet: "dàn nhạc của trường", ger: "das Schulorchester" },
		{ viet: "từ vựng", ger: "die Vokabel" },
		{ viet: "kể", ger: "erzählen" },
		{ viet: "câu chuyện", ger: "die Geschichte" },
		{ viet: "môn học", ger: "das Fach" },
		{ viet: "các môn học", ger: "die Fächer" },
		{ viet: "tiểu học", ger: "die Grundschule" },
		{ viet: "trung học cơ sở", ger: "die Mittelschule" },
		{ viet: "trung học phổ thông", ger: "das Gymnasium" },
		{ viet: "trường tổng hợp", ger: "die Gesamtschule" },
		{ viet: "làm quen / gặp lần đầu / làm quen với ai đó", ger: "kennenlernen" },
		{ viet: "địa điểm", ger: "der Ort" },
		{ viet: "chọn , lựa chọn", ger: "wählen" },
		{ viet: "rượu bia", ger: "der Alkohol" },
		{ viet: "quy tắc , luật lệ", ger: "die Regel" },
		{ viet: "quan trọng", ger: "wichtig" },
		{ viet: "thật à", ger: "Wirklich" },
		{ viet: "môn cờ vua", ger: "das Schach" },
		{ viet: "tuyệt vời , rất ấn tượng (dùng khi rất ngạc nhiên hoặc rất thích)", ger: "fantastisch" },
		{ viet: "chắc chắn , tuyệt đối , nhất định", ger: "unbedingt" },
		{ viet: "đều đặn", ger: "regelmäßig" },
		{ viet: "đan", ger: "stricken" },
		{ viet: "một vài", ger: "ein paar" },
		{ viet: "đã , rồi , từ trước", ger: "bereits" },
		{ viet: "xảy ra", ger: "passieren" },
		{ viet: "tựa đề , tiêu đề", ger: "der Betreff" },
		{ viet: "lại", ger: "wieder" },
		{ viet: "hoạt động", ger: "die Aktivität" },
		{ viet: "tổ chức", ger: "organisieren" },
		{ viet: "bài hát", ger: "das Lied" },
		{ viet: "sáng tạo", ger: "kreativ" },
		{ viet: "trước đó", ger: "vorher" },
		{ viet: "chuyển nhà", ger: "ziehen" },
		{ viet: "vùng miền", ger: "die Region" },
		{ viet: "sử dụng", ger: "nutzen" },
		{ viet: "mỗi , cho mỗi , trên mỗi", ger: "pro" },
		{ viet: "hoàn toàn", ger: "ganz" },
		{ viet: "đặt (bàn)", ger: "reservieren" },
		{ viet: "rửa bát", ger: "das Spülen" },
		{ viet: "cái chảo", ger: "die Pfanne" },
		{ viet: "cái bát", ger: "die Schüssel" },
		{ viet: "cái rổ", ger: "das Sieb" },
		{ viet: "bồn rửa", ger: "die Spüle" },
		{ viet: "con dao", ger: "das Messer" },
		{ viet: "cắt , thái", ger: "schneiden" },
		{ viet: "công thức", ger: "das Rezept" },
		{ viet: "đặt , để", ger: "stellen" },
		{ viet: "trước kia", ger: "früher" },
        { viet: "buồn", ger: "traurig" }

];

let currentIndex=0;
let shuffledVocab=[];
let germanVoice=null;

let speechSpeed=0.7;

const slider=document.getElementById("speedSlider");
const speedText=document.getElementById("speedValue");

slider.oninput=function(){
speechSpeed=this.value;
speedText.innerText=this.value;
};

function shuffleArray(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function initGame(){
shuffledVocab=shuffleArray([...vocabulary]);
currentIndex=0;
loadQuestion();
}

function loadQuestion(){

const item=shuffledVocab[currentIndex];

document.getElementById("vietWord").innerText=item.viet;
document.getElementById("gerInput").value="";
document.getElementById("feedback").innerText="";

document.getElementById("progress").innerText=
`Câu ${currentIndex+1} / ${shuffledVocab.length}`;

const percent=(currentIndex/shuffledVocab.length)*100;

document.getElementById("progressFill").style.width=percent+"%";

}

function loadVoices(){

const voices=speechSynthesis.getVoices();

germanVoice=voices.find(v=>v.lang==="de-DE"||v.lang.startsWith("de"))||null;

}

function speakWord(){

const word=shuffledVocab[currentIndex].ger;

if(!word) return;

speechSynthesis.cancel();

const speech=new SpeechSynthesisUtterance(word);

speech.lang="de-DE";

if(germanVoice){
speech.voice=germanVoice;
}

speech.rate=speechSpeed;

speech.pitch=1;

speechSynthesis.speak(speech);

}

function checkAnswer(){

const input=document.getElementById("gerInput").value.trim().toLowerCase();
const correct=shuffledVocab[currentIndex].ger.toLowerCase();
const feedback=document.getElementById("feedback");

if(input===correct){

feedback.innerText="Chính xác! 🎉";
feedback.className="feedback correct";

setTimeout(()=>{
nextQuestion();
},800);

}else{

feedback.innerText=`Sai rồi. Đáp án: ${correct}`;
feedback.className="feedback wrong";

}

}

function nextQuestion(){

currentIndex++;

if(currentIndex<shuffledVocab.length){

loadQuestion();

}else{

document.querySelector(".container").innerHTML=`
<h1>🎉 Hoàn thành</h1>
<p>Bạn đã học xong toàn bộ từ vựng</p>
<button class="btn" onclick="initGame()">Học lại</button>
`;

}

}

document.getElementById("gerInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkAnswer();
}
});

speechSynthesis.onvoiceschanged=loadVoices;

loadVoices();

initGame();

</script>

</body>
</html>
